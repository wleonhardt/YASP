name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      ECR_REPO: yasp
      INSTANCE_ID: i-003291a1bb795a624

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull from Docker Hub and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          DOCKERHUB_IMAGE="wleonhardt/yasp:latest"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${SHORT_SHA}"
          ECR_LATEST="${ECR_REGISTRY}/${ECR_REPO}:main"

          docker pull "${DOCKERHUB_IMAGE}"
          docker tag "${DOCKERHUB_IMAGE}" "${ECR_IMAGE}"
          docker tag "${DOCKERHUB_IMAGE}" "${ECR_LATEST}"
          docker push "${ECR_IMAGE}"
          docker push "${ECR_LATEST}"

          echo "image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "### Pushed to ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${ECR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${ECR_LATEST}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Restart YASP on EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${SHORT_SHA}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -euxo pipefail',
              'aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}',
              'docker pull ${ECR_IMAGE}',
              'docker stop yasp || true',
              'docker rm yasp || true',
              'docker run -d --name yasp --restart unless-stopped --publish 127.0.0.1:3001:3001 --env NODE_ENV=production --env PORT=3001 --log-opt max-size=10m --log-opt max-file=3 ${ECR_IMAGE}',
              'sleep 5',
              'curl -sf http://127.0.0.1:3001/api/health || { echo HEALTH CHECK FAILED; docker logs yasp --tail 20; exit 1; }'
            ]" \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # Wait for the command to complete
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "### Deployed successfully" >> "$GITHUB_STEP_SUMMARY"
              echo "- Instance: \`${INSTANCE_ID}\`" >> "$GITHUB_STEP_SUMMARY"
              echo "- Image: \`${ECR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Command failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query '{StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SSM command"
          exit 1
