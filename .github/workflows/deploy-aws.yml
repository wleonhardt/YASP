name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPO: ${{ vars.ECR_REPO || 'yasp' }}
  INSTANCE_ID: ${{ vars.INSTANCE_ID }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'wleonhardt/yasp' }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      # Fail fast with a human-readable message if the production
      # environment forgot to set INSTANCE_ID (or any other required
      # var). Otherwise the failure surfaces downstream as an opaque
      # `aws ssm send-command` ValidationException.
      - name: Preflight required variables
        run: |
          missing=()
          [ -n "${INSTANCE_ID}" ] || missing+=("INSTANCE_ID")
          [ -n "${AWS_REGION}" ]  || missing+=("AWS_REGION")
          [ -n "${ECR_REPO}" ]    || missing+=("ECR_REPO")
          [ -n "${DOCKERHUB_IMAGE}" ] || missing+=("DOCKERHUB_IMAGE")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Deploy aborted — missing required variables: ${missing[*]}."
            echo "::error::Set these under Settings → Environments → production → Environment variables."
            exit 1
          fi
          # INSTANCE_ID format sanity check (EC2 = i-<8 or 17 hex>, SSM-managed = mi-<17 hex>).
          if ! [[ "$INSTANCE_ID" =~ ^(i-([0-9a-f]{8}|[0-9a-f]{17})|mi-[0-9a-f]{17})$ ]]; then
            echo "::error::INSTANCE_ID='${INSTANCE_ID}' does not look like an EC2/SSM instance id."
            exit 1
          fi
          echo "Preflight OK — deploying to ${INSTANCE_ID} in ${AWS_REGION}."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Tagged STS session shows up in CloudTrail as
          # `gh-deploy-yasp-<run_id>` so a specific workflow run can be
          # traced back from any AWS API call the role made. The IAM
          # trust policy should restrict `token.actions.githubusercontent.com:sub`
          # to this repo+branch+environment — role-session-name is a log
          # aid, not an auth factor.
          role-session-name: gh-deploy-yasp-${{ github.run_id }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Pull from Docker Hub and push to ECR
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          # Pull the floating `:main` tag rather than the per-commit
          # short-SHA tag. Rationale: when multiple pushes to `main`
          # land in quick succession, the `workflow_run` concurrency
          # group (`cancel-in-progress: true`) cancels older CI /
          # Docker Publish runs, but Deploy still fires once the
          # surviving Docker Publish completes. GitHub records the
          # Deploy event's `workflow_run.head_sha` as the latest main
          # HEAD *at Deploy schedule time*, which may be a newer commit
          # than the one Docker Publish actually built. Pulling by
          # `:main` sidesteps that race — we always deploy whatever
          # Docker Publish most recently pushed.
          #
          # For the ECR side we resolve the pulled image's
          # content-addressable digest and derive a short, immutable
          # tag from it. That gives each deploy a unique ECR ref for
          # audit / rollback that matches the exact bytes we deployed,
          # independent of whichever git SHA Deploy happened to see.
          SHORT_SHA="${HEAD_SHA::8}"
          DOCKERHUB_IMAGE_MAIN="${DOCKERHUB_IMAGE}:main"

          docker pull "${DOCKERHUB_IMAGE_MAIN}"

          # `RepoDigests` is populated only for images pulled from a
          # registry (not locally built), so this is safe after the
          # pull above.
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${DOCKERHUB_IMAGE_MAIN}" | awk -F'@sha256:' '{print $2}')"
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve digest for ${DOCKERHUB_IMAGE_MAIN}"
            exit 1
          fi
          DIGEST_TAG="sha256-${DIGEST:0:12}"

          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${DIGEST_TAG}"
          ECR_MAIN="${ECR_REGISTRY}/${ECR_REPO}:main"

          docker tag "${DOCKERHUB_IMAGE_MAIN}" "${ECR_IMAGE}"
          docker tag "${DOCKERHUB_IMAGE_MAIN}" "${ECR_MAIN}"
          docker push "${ECR_IMAGE}"
          docker push "${ECR_MAIN}"

          echo "image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "### Pushed to ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "- workflow_run head_sha: \`${SHORT_SHA}\` (for reference; may lag last built image during rapid-merge windows)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployed image: \`${ECR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${ECR_MAIN}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_IMAGE: ${{ steps.image.outputs.image }}
        run: |

          # Build SSM parameters as JSON via jq to avoid all escaping issues.
          # The deploy script: updates the image tag, restarts systemd, polls health.
          DEPLOY_SCRIPT=$(cat <<'SCRIPT'
          set -euxo pipefail
          IMAGE="__IMAGE__"
          RUN_SCRIPT=/usr/local/bin/yasp-run.sh

          # PR G / F-17 rollback support. Capture the currently-deployed
          # IMAGE_IDENTIFIER *before* we mutate the run script, so that a
          # failing deploy can restore the previous, known-good image.
          PREV_IMAGE="$(grep -E '^IMAGE_IDENTIFIER=' "$RUN_SCRIPT" | head -n1 | sed -E 's/^IMAGE_IDENTIFIER="?([^"]*)"?$/\1/')"
          echo "Previous image: ${PREV_IMAGE:-<none>}"
          echo "Attempting image: ${IMAGE}"

          log_disk_state() {
            echo '--- df -h ---'
            df -h / /var/lib/docker 2>&1 || df -h / 2>&1 || true
            echo '--- docker system df ---'
            docker system df 2>&1 || true
          }

          reclaim_docker_space() {
            # The EC2 origin is a dedicated single-service host. Reclaim all
            # Docker state that is not attached to the currently-running
            # container before we ask Docker to register another immutable
            # image tag. This avoids repeated deploys filling /var/lib/docker
            # with unused layers while preserving the running container until
            # systemd actually performs the restart.
            echo '--- disk state before Docker reclaim ---'
            log_disk_state
            docker container prune -f 2>&1 || true
            docker image prune -af 2>&1 || true
            docker builder prune -af 2>&1 || true
            docker volume prune -f 2>&1 || true
            echo '--- disk state after Docker reclaim ---'
            log_disk_state
          }

          wait_for_health() {
            local n=0
            while [ $n -lt 12 ]; do
              n=$((n+1))
              sleep 5
              if curl -sf http://127.0.0.1:3001/api/health; then
                echo
                echo "Health check passed on attempt $n"
                return 0
              fi
              echo "Attempt $n: not ready"
            done
            return 1
          }

          reclaim_docker_space
          sed -i "s|^IMAGE_IDENTIFIER=.*|IMAGE_IDENTIFIER=\"${IMAGE}\"|" "$RUN_SCRIPT"
          grep IMAGE_IDENTIFIER "$RUN_SCRIPT"
          systemctl restart yasp
          echo "Waiting for container to start..."
          if wait_for_health; then
            exit 0
          fi

          echo "HEALTH CHECK FAILED after 60s for image ${IMAGE}"
          echo '--- systemctl status yasp ---'
          systemctl status yasp --no-pager 2>&1 || true
          echo '--- journalctl -u yasp (last 300 lines) ---'
          # `docker run --rm` deletes the container on exit, so
          # `docker logs yasp` returns "No such container" once the
          # process has crashed. The container's stdout/stderr is still
          # captured by the systemd unit (yasp.service runs yasp-run.sh
          # in the foreground), so journalctl is the only reliable
          # source of the actual crash output.
          journalctl -u yasp -n 300 --no-pager 2>&1 || true
          echo '--- docker logs yasp (likely empty due to --rm) ---'
          docker logs yasp --tail 50 2>&1 || true
          echo '--- disk state after failed start ---'
          log_disk_state
          echo '--- docker image inspect (entrypoint/cmd/env) ---'
          docker image inspect "$IMAGE" --format '{{json .Config}}' 2>&1 || true
          echo '--- yasp-run.sh head ---'
          head -60 "$RUN_SCRIPT" 2>&1 || true

          # Rollback: only if we have a previous image recorded AND it is
          # different from the one we just failed on. If PREV_IMAGE is
          # empty (first deploy) or identical (unlikely — redeploy of the
          # same tag), there is nothing to roll back to; exit failing so
          # the workflow surfaces the problem.
          if [ -z "$PREV_IMAGE" ] || [ "$PREV_IMAGE" = "$IMAGE" ]; then
            echo "No distinct previous image to roll back to (prev=${PREV_IMAGE:-<none>}, attempted=${IMAGE}). Giving up."
            exit 1
          fi

          echo "ROLLBACK: restoring previous image ${PREV_IMAGE}"
          reclaim_docker_space
          sed -i "s|^IMAGE_IDENTIFIER=.*|IMAGE_IDENTIFIER=\"${PREV_IMAGE}\"|" "$RUN_SCRIPT"
          grep IMAGE_IDENTIFIER "$RUN_SCRIPT"
          systemctl restart yasp

          if wait_for_health; then
            echo "ROLLBACK SUCCEEDED to ${PREV_IMAGE}"
            # Still exit non-zero — the *intended* deploy failed, and we
            # want the workflow to show red so the operator investigates.
            exit 1
          fi

          echo "ROLLBACK FAILED — previous image ${PREV_IMAGE} also unhealthy"
          echo '--- systemctl status yasp ---'
          systemctl status yasp --no-pager 2>&1 || true
          echo '--- journalctl -u yasp (last 300 lines) ---'
          journalctl -u yasp -n 300 --no-pager 2>&1 || true
          echo '--- docker logs yasp (likely empty due to --rm) ---'
          docker logs yasp --tail 50 2>&1 || true
          exit 1
          SCRIPT
          )

          # Substitute the actual image reference
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__IMAGE__/$ECR_IMAGE}"

          # Build the JSON parameters file
          jq -n --arg script "$DEPLOY_SCRIPT" '{"commands": [$script]}' > /tmp/ssm-params.json

          echo "SSM parameters:"
          cat /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # Wait for the command to complete
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>&1) || {
              echo "Warning: get-command-invocation failed: $STATUS"
              STATUS="Pending"
            }

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "### Deployed successfully" >> "$GITHUB_STEP_SUMMARY"
              echo "- Instance: \`${INSTANCE_ID}\`" >> "$GITHUB_STEP_SUMMARY"
              echo "- Image: \`${ECR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Command failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query '{StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SSM command"
          exit 1
