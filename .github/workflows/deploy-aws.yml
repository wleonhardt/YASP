name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPO: ${{ vars.ECR_REPO || 'yasp' }}
  INSTANCE_ID: ${{ vars.INSTANCE_ID || 'i-003291a1bb795a624' }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'wleonhardt/yasp' }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull from Docker Hub and push to ECR
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          SHORT_SHA="${HEAD_SHA::8}"
          DOCKERHUB_IMAGE="${DOCKERHUB_IMAGE}:${SHORT_SHA}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${SHORT_SHA}"
          ECR_MAIN="${ECR_REGISTRY}/${ECR_REPO}:main"

          docker pull "${DOCKERHUB_IMAGE}"
          docker tag "${DOCKERHUB_IMAGE}" "${ECR_IMAGE}"
          docker tag "${DOCKERHUB_IMAGE}" "${ECR_MAIN}"
          docker push "${ECR_IMAGE}"
          docker push "${ECR_MAIN}"

          echo "image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "### Pushed to ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${ECR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${ECR_MAIN}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          SHORT_SHA="${HEAD_SHA::8}"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${SHORT_SHA}"

          # Build SSM parameters as JSON via jq to avoid all escaping issues.
          # The deploy script: updates the image tag, restarts systemd, polls health.
          DEPLOY_SCRIPT=$(cat <<'SCRIPT'
          set -euxo pipefail
          IMAGE="__IMAGE__"
          sed -i "s|^IMAGE_IDENTIFIER=.*|IMAGE_IDENTIFIER=\"${IMAGE}\"|" /usr/local/bin/yasp-run.sh
          grep IMAGE_IDENTIFIER /usr/local/bin/yasp-run.sh
          systemctl restart yasp
          echo "Waiting for container to start..."
          n=0
          while [ $n -lt 12 ]; do
            n=$((n+1))
            sleep 5
            if curl -sf http://127.0.0.1:3001/api/health; then
              echo
              echo "Health check passed on attempt $n"
              exit 0
            fi
            echo "Attempt $n: not ready"
          done
          echo "HEALTH CHECK FAILED after 60s"
          systemctl status yasp --no-pager 2>&1 || true
          docker logs yasp --tail 30 2>&1 || true
          exit 1
          SCRIPT
          )

          # Substitute the actual image reference
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__IMAGE__/$ECR_IMAGE}"

          # Build the JSON parameters file
          jq -n --arg script "$DEPLOY_SCRIPT" '{"commands": [$script]}' > /tmp/ssm-params.json

          echo "SSM parameters:"
          cat /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # Wait for the command to complete
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>&1) || {
              echo "Warning: get-command-invocation failed: $STATUS"
              STATUS="Pending"
            }

            echo "Attempt $i: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "### Deployed successfully" >> "$GITHUB_STEP_SUMMARY"
              echo "- Instance: \`${INSTANCE_ID}\`" >> "$GITHUB_STEP_SUMMARY"
              echo "- Image: \`${ECR_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Command failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query '{StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SSM command"
          exit 1
