name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  DOCKER_PLATFORM: ${{ vars.DOCKER_PLATFORM || 'linux/amd64' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_TEST_URL: redis://127.0.0.1:6379/10

    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate translations
        run: npm run i18n:check

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check formatting
        run: npm run format:check

      # Advisory-only production dependency audit (F-20).
      #
      # Runs `npm audit --omit=dev --audit-level=high`:
      #   - `--omit=dev`        : ignore devDependencies (test/build tooling
      #                            doesn't ship in the runtime image).
      #   - `--audit-level=high`: non-zero exit only for high/critical
      #                            advisories; moderate/low still appear in
      #                            the output but do not set the exit code.
      #
      # The step uses `continue-on-error: true` so that a newly-published
      # advisory cannot red a PR before someone has had a chance to triage
      # it. The raw audit text and the JSON summary are appended to the
      # GitHub Actions step summary so the posture is visible on every run.
      #
      # Flip `continue-on-error` off (or drop it entirely) once the audit
      # run is reliably clean — see SECURITY_REMEDIATION_PLAN.md F-20.
      - name: Production dependency audit (advisory)
        id: npm-audit
        continue-on-error: true
        run: |
          echo "## Production npm audit (advisory, non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          set +e
          npm audit --omit=dev --audit-level=high | tee /tmp/npm-audit.txt
          AUDIT_EXIT=$?
          set -e
          cat /tmp/npm-audit.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "_Advisory: high/critical production advisory present. Triage via Dependabot; this step is not yet a hard gate._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Clean at high/critical._" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$AUDIT_EXIT"

  a11y-smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility smoke tests
        run: npm run test:a11y

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-a11y-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  docker-validation:
    needs: [validate, a11y-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          platforms: ${{ env.DOCKER_PLATFORM }}
          tags: yasp:ci

      - name: Start container
        run: docker run -d --rm --platform ${{ env.DOCKER_PLATFORM }} --name yasp-ci -p 3001:3001 yasp:ci

      - name: Verify health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3001/api/health | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 3
          done
          echo "Container failed health check"
          docker logs yasp-ci
          exit 1

      - name: Verify root document
        run: curl -fsS http://127.0.0.1:3001/ | grep -qi '<!doctype html'

      - name: Stop container
        if: always()
        run: docker stop yasp-ci || true

  cdk-synth:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect CDK changes
        id: cdk-changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$base_sha" "$head_sha" -- cdk; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.cdk-changes.outputs.changed == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install CDK dependencies
        if: steps.cdk-changes.outputs.changed == 'true'
        working-directory: cdk
        run: npm ci

      - name: Synthesize CDK
        if: steps.cdk-changes.outputs.changed == 'true'
        working-directory: cdk
        run: npx cdk synth -c imageTag=ci-synth

      - name: Skip synth when CDK is unchanged
        if: steps.cdk-changes.outputs.changed != 'true'
        run: echo "No changes under cdk/. Skipping synth."
