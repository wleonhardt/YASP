# Dependency Review: PR-only gate that inspects the diff between base
# and head for newly introduced vulnerable or disallowed dependencies.
# Fails on high/critical GHSA advisories. Runs on every PR, including
# forks (uses read-only `contents` permission).
#
# Why a separate workflow: the action needs `pull_request` event
# metadata and its own permissions surface; folding it into ci.yml
# would bloat that workflow's permission grant for no benefit.
name: Dependency review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      # Advisory until the repo has the Dependency graph feature
      # enabled under Settings → Code security and analysis. Without
      # dep-graph the action aborts with "Dependency review is not
      # supported on this repository", which would red every PR for a
      # reason unrelated to actual advisories. Flip this to a hard
      # gate (drop `continue-on-error`) as soon as dep-graph is on.
      - name: Run dependency review (advisory until dep-graph enabled)
        id: dep-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          # Hard gate once promoted: newly introduced high/critical
          # advisories block the PR. Moderate/low show in the summary
          # but do not fail.
          fail-on-severity: high
          # Surface the full report in the PR check summary so reviewers
          # see every advisory touched by the change, not just the ones
          # that trip the gate.
          comment-summary-in-pr: on-failure
