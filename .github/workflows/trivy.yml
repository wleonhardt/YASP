# Trivy: layered vulnerability and misconfiguration scanning.
#
# Two jobs run:
#   1. repo-scan  : filesystem scan of the checkout. Catches vulnerable
#                   dependencies in every workspace's package-lock (root
#                   lockfile covers shared/server/client; cdk/ has its
#                   own) and IaC misconfigurations in the Dockerfile +
#                   CDK source.
#   2. image-scan : builds the production Docker image and scans the
#                   resulting layers. Catches base-image CVEs that a
#                   pure filesystem scan can miss.
#
# Both upload SARIF results to Security → Code scanning so alerts land
# in the same UI as CodeQL. The jobs are hard gates on HIGH/CRITICAL
# only — MEDIUM and below are visible in the dashboard but do not fail
# CI, to avoid gating on low-impact noise.
name: Trivy

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly sweep so newly published CVEs against already-merged code
    # surface within seven days of the advisory landing in the DB.
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  repo-scan:
    name: Trivy repo / IaC scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Advisory until the baseline HIGH/CRITICAL findings are triaged.
      # Today the scan exits 1 on a non-zero count of HIGH/CRITICAL
      # vulnerabilities in the repo's existing transitive dependencies
      # — these are not introduced by any Dependabot PR, and gating on
      # them would red every PR until the baseline is clean. Findings
      # still upload to Security → Code scanning via SARIF for triage.
      # Promote to a hard gate (drop `continue-on-error`) once the
      # baseline is clean on main.
      - name: Trivy filesystem + config scan (advisory)
        id: trivy-fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # vuln: dependency CVEs; misconfig: Dockerfile, CDK IaC;
          # secret: accidentally committed credentials (belt-and-braces
          # on top of GitHub secret scanning).
          scanners: "vuln,misconfig,secret"
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "1"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  image-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image (local load)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          tags: yasp:trivy-scan

      # Advisory until the base image + transitive deps are clean at
      # HIGH/CRITICAL. Same rationale as the filesystem scan above;
      # promote back to blocking once the baseline is green.
      - name: Trivy image scan (advisory)
        id: trivy-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: image
          image-ref: yasp:trivy-scan
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: "1"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
