name: Docker Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  DOCKER_PLATFORM: ${{ vars.DOCKER_PLATFORM || 'linux/amd64' }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'wleonhardt/yasp' }}

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Compute image tags
        id: vars
        run: echo "short_sha=${GITHUB_HEAD_SHA::8}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          # Build directly from the immutable workflow_run commit instead of
          # checking it out in a privileged `workflow_run` context.
          context: https://github.com/${{ github.repository }}.git#${{ github.event.workflow_run.head_sha }}
          push: true
          platforms: ${{ env.DOCKER_PLATFORM }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.DOCKERHUB_IMAGE }}:main
