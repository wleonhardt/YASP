version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      production:
        dependency-type: production
      dev:
        dependency-type: development
    open-pull-requests-limit: 10
    ignore:
      # eslint-plugin-jsx-a11y@6.10.x peer-depends on eslint ^3..^9.
      # Block eslint + its sibling packages' majors until jsx-a11y ships
      # a release that accepts eslint 10+ (track
      # https://github.com/jsx-eslint/eslint-plugin-jsx-a11y releases).
      # Minors/patches still flow through. Remove these entries once the
      # plugin's peer range is widened.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: "@eslint/js"
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/eslint"
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/eslint__js"
        update-types:
          - version-update:semver-major
      # React 19 migration is a deliberate piece of work (stricter child
      # validation broke ~55 client tests in PR #39). Pin majors on React
      # and the i18n stack that ships tight peer ranges against React so
      # grouped bumps stay mergeable. Minors/patches continue to flow.
      # When scheduling the React 19 upgrade, remove these four entries
      # in the same PR that does the migration.
      - dependency-name: react
        update-types:
          - version-update:semver-major
      - dependency-name: react-dom
        update-types:
          - version-update:semver-major
      - dependency-name: react-i18next
        update-types:
          - version-update:semver-major
      - dependency-name: i18next
        update-types:
          - version-update:semver-major
      # eslint-plugin-react-hooks 6.x introduced new
      # `react-hooks/set-state-in-effect` / ref-during-render / impure-
      # render rules that flag 11 pre-existing patterns (see PR #40).
      # Pin majors until the code is cleaned up in a dedicated PR, then
      # remove this entry.
      - dependency-name: eslint-plugin-react-hooks
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
