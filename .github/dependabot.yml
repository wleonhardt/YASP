version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      production:
        dependency-type: production
      dev:
        dependency-type: development
    open-pull-requests-limit: 10
    ignore:
      # eslint-plugin-jsx-a11y@6.10.x peer-depends on eslint ^3..^9.
      # Block eslint + its sibling packages' majors until jsx-a11y ships
      # a release that accepts eslint 10+ (track
      # https://github.com/jsx-eslint/eslint-plugin-jsx-a11y releases).
      # Minors/patches still flow through. Remove these entries once the
      # plugin's peer range is widened.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: "@eslint/js"
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/eslint"
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/eslint__js"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
